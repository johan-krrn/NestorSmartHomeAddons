name: "Nestor Smart Home Bridge"
version: "1.4.0"
slug: "nestor_smart_home_bridge"
description: "Bridge MQTT v5 <-> Home Assistant WebSocket for Nestor cloud"
url: "https://github.com/johan-krrn/NestorSmartHomeAddons"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:bridge"
panel_title: "Nestor Smart Home Bridge"
hassio_api: true
homeassistant_api: true
auth_api: true
host_network: false
options:
  mqtt_client_id: ""
  box_id: ""
  log_level: "info"
  telemetry_filter:
    domains:
      - "light"
      - "switch"
      - "sensor"
      - "climate"
      - "binary_sensor"
  local_mqtt:
    enabled: false
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    topics:
      - "zigbee2mqtt/bridge/event"
      - "zigbee2mqtt/bridge/state"
schema:
  mqtt_client_id: str
  box_id: str
  log_level: "list(trace|debug|info|warning|error)"
  telemetry_filter:
    domains:
      - str
  local_mqtt:
    enabled: bool
    host: str
    port: port
    username: "str?"
    password: "str?"
    topics:
      - str
map:
  - ssl:ro
