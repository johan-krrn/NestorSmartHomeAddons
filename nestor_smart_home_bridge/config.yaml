name: "Nestor Smart Home Bridge"
version: "1.3.2"
slug: "nestor_smart_home_bridge"
description: "Bridge MQTT v5 <-> Home Assistant WebSocket for Nestor cloud"
url: "https://github.com/johan-krrn/NestorSmartHomeAddons"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:bridge"
panel_title: "Nestor Smart Home Bridge"
hassio_api: true
homeassistant_api: true
auth_api: true
host_network: false
options:
  mqtt_host: "eg-nestorsmarthome-poc.westeurope-1.ts.eventgrid.azure.net"
  mqtt_port: 8883
  mqtt_client_id: ""
  box_id: ""
  auth_mode: "sas"
  sas_username: ""
  sas_password: ""
  cert_path: "/ssl/certs/device.crt"
  key_path: "/ssl/certs/device.key"
  ca_path: "/ssl/certs/ca.crt"
  log_level: "info"
  no_tls: false
  ha_ws_endpoint: ""
  telemetry_filter:
    domains:
      - "light"
      - "switch"
      - "sensor"
      - "climate"
      - "binary_sensor"
  local_mqtt:
    enabled: false
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    topics:
      - "zigbee2mqtt/bridge/logging"
      - "zigbee2mqtt/bridge/event"
      - "zigbee2mqtt/bridge/state"
schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_client_id: str
  box_id: str
  auth_mode: "list(sas|x509)"
  sas_username: "str?"
  sas_password: "str?"
  cert_path: str
  key_path: str
  ca_path: str
  log_level: "list(trace|debug|info|warning|error)"
  no_tls: bool
  ha_ws_endpoint: "str?"
  telemetry_filter:
    domains:
      - str
  local_mqtt:
    enabled: bool
    host: str
    port: port
    username: "str?"
    password: "str?"
    topics:
      - str
map:
  - ssl:ro
